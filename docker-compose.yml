# Job Hunter Bot — Docker Compose deployment
#
# Usage:
#   1. cp .env.example .env   # then fill in your real tokens
#   2. docker compose up -d   # start in detached mode
#   3. docker compose logs -f # watch the logs
#   4. docker compose down    # stop and remove the container

services:
  bot:
    build: .
    container_name: job-hunter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the default DB path so the database file lands
      # inside the mounted volume, surviving container rebuilds.
      - DATABASE_URL=sqlite+aiosqlite:///./data/jobs.db
    volumes:
      # Persist the SQLite database on the host so job listings
      # survive container restarts and image rebuilds.
      - ./data:/app/data
